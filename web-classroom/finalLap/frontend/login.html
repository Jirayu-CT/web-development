<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="bg-gray-800 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="#" class="text-white text-lg font-bold" id="site-title">My Website</a>
            <div class="block lg:hidden">
                <button id="nav-toggle" class="text-white focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
            </div>
            <div class="hidden lg:flex lg:items-center lg:w-auto w-full ml-auto" id="nav-content">
                <ul class="lg:flex lg:justify-between text-white">
                    <li><a href="#" class="block lg:inline-block px-4 py-2">Home</a></li>
                    <li><a href="#" class="block lg:inline-block px-4 py-2">About</a></li>
                    <li><a href="#" class="block lg:inline-block px-4 py-2">Services</a></li>
                    <li><a href="#" class="block lg:inline-block px-4 py-2">Contact</a></li>
                </ul>
            </div>
        </div>
        <div class="lg:hidden hidden" id="nav-content-mobile">
            <ul class="text-white text-center">
                <li><a href="#" class="block px-4 py-2">Home</a></li>
                <li><a href="#" class="block px-4 py-2">About</a></li>
                <li><a href="#" class="block px-4 py-2">Services</a></li>
                <li><a href="#" class="block px-4 py-2">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto p-4 flex justify-center items-center">
        <div class="w-full max-w-md bg-white p-8 rounded shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
            <form id="loginForm" action="/api/login" method="POST">
                <div class="mb-4">
                    <label for="username" class="block text-gray-700">Username</label>
                    <input type="text" id="username" name="username" class="w-full px-3 py-2 border rounded" required>
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-gray-700">Password</label>
                    <input type="password" id="password" name="password" class="w-full px-3 py-2 border rounded" required>
                    <a href="#" class="flex justify-end mr-2 text-gray-600 hover:text-gray-800">Forgot Password?</a>
                </div>
                <div class="flex items-center justify-between">
                    <button type="submit" class="w-full bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-700">Login</button>
                </div>
            </form>
            <p class="mt-4 text-center">Don't have an account? <a href="./register.html" class="text-blue-500 hover:text-blue-700">Sign Up</a></p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 p-4 text-white">
        <div class="container mx-auto text-center">
            <p>&copy; 2025 My Website. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Hamburger menu toggle
        document.getElementById('nav-toggle').addEventListener('click', function () {
            const navContentMobile = document.getElementById('nav-content-mobile');
            const siteTitle = document.getElementById('site-title');
            navContentMobile.classList.toggle('hidden');
            siteTitle.classList.toggle('mx-auto');
        });
    </script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const response = await fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username,
                    password
                }),
                credentials: 'include'
            });
            const data = await response.json();
            if (response.ok) {
                alert('Login successful');
                window.location.href = './index.html';
            } else {
                alert('Login failed');
            }
        });
    </script>
</body>

</html>
