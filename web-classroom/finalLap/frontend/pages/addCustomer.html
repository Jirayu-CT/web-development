<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Customer</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/17833f8b00.js" crossorigin="anonymous"></script>
</head>

<body class="flex flex-col min-h-screen">

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto p-4 flex justify-center items-center">
        <div class="w-full max-w-md bg-white p-8 rounded shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Add Customer</h2>
            <form id="addCustomerForm" action="/api/customers" method="POST">
                <div class="mb-4">
                    <label for="fullName" class="block text-gray-700">Full Name</label>
                    <input type="text" id="fullName" name="fullName" class="w-full px-3 py-2 border rounded" required>
                </div>
                <div class="mb-6">
                    <label for="customerType" class="block text-gray-700">Customer Type</label>
                    <select id="customerType" name="customerType" class="w-full px-3 py-2 border rounded" required>
                        <option value="ทั่วไป">ทั่วไป</option>
                        <option value="Premium">Premium</option>
                    </select>
                </div>
                <div class="flex items-center justify-between">
                    <button type="submit" class="w-full bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-700">Add Customer</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script>
        // Load navbar and footer
        const loadComponents = async () => {
            const navbar = await fetch('../components/navbar.html').then(res => res.text());
            document.getElementById('navbar').innerHTML = navbar;

            const footer = await fetch('../components/footer.html').then(res => res.text());
            document.getElementById('footer').innerHTML = footer;

            // Load scripts after components are loaded
            const script = document.createElement('script');
            script.src = '../js/script.js';
            document.body.appendChild(script);

            const logout = document.createElement('script');
            logout.src = '../js/logout.js';
            document.body.appendChild(logout);

            const addCustomer = document.createElement('script');
            addCustomer.src = '../js/addCustomer.js';
            document.body.appendChild(addCustomer);
        }

        loadComponents();
    </script>
</body>

</html>
