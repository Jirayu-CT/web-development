<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex flex-col min-h-screen">

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto p-4">
        <h1 class="text-3xl font-bold">Welcome to My Website</h1>
        <p class="mt-4">This is the main content of the page.</p>
        <p class="mt-4">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Molestias animi hic fugiat eum iure
            iusto commodi tempore ipsum, harum dolorem eos voluptatum natus omnis quidem veniam, cum laboriosam voluptas
            facere.
        </p>
        <div id="get-profile">
            <p>Username: <span id="get-username"></span></p>
            <p>Password: <span id="get-password"></span></p>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer"></div>


    <script>
        // Load navbar and footer
        const loadComponents = async () => {
            const navbar = await fetch('../components/navbar.html').then(res => res.text());
            document.getElementById('navbar').innerHTML = navbar;

            const footer = await fetch('../components/footer.html').then(res => res.text());
            document.getElementById('footer').innerHTML = footer;

            // Load scripts after components are loaded
            const script = document.createElement('script');
            script.src = '../js/script.js';
            document.body.appendChild(script);
        }

        loadComponents();
    </script>
</body>

</html>
