<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Password</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/17833f8b00.js" crossorigin="anonymous"></script>
</head>

<body class="flex flex-col min-h-screen">

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto p-4 flex justify-center items-center">
        <div class="w-full max-w-md bg-white p-8 rounded shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Edit Password</h2>
            <form id="editPasswordForm" action="/api/edit-password" method="POST">
                <div class="mb-4">
                    <label for="oldPassword" class="block text-gray-700">Old Password</label>
                    <div class="relative flex items-center">
                        <input type="password" id="oldPassword" name="oldPassword" class="w-full px-3 py-2 border rounded" required>
                        <button id="toggle-old-password" type="button"
                            class="absolute right-4 text-gray-600 hover:text-gray-200"
                            onclick="togglePasswordVisibility('oldPassword', 'toggle-old-password')">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-6">
                    <label for="newPassword" class="block text-gray-700">New Password</label>
                    <div class="relative flex items-center">
                        <input type="password" id="newPassword" name="newPassword" class="w-full px-3 py-2 border rounded" required>
                        <button id="toggle-new-password" type="button"
                            class="absolute right-4 text-gray-600 hover:text-gray-200"
                            onclick="togglePasswordVisibility('newPassword', 'toggle-new-password')">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <button type="submit" class="w-full bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-700">Update Password</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script>
        // Load navbar and footer
        const loadComponents = async () => {
            const navbar = await fetch('../components/navbar.html').then(res => res.text());
            document.getElementById('navbar').innerHTML = navbar;

            const footer = await fetch('../components/footer.html').then(res => res.text());
            document.getElementById('footer').innerHTML = footer;

            // Load scripts after components are loaded
            const script = document.createElement('script');
            script.src = '../js/script.js';
            document.body.appendChild(script);

            const logout = document.createElement('script');
            logout.src = '../js/logout.js';
            document.body.appendChild(logout);

            const scriptApi = document.createElement('script');
            scriptApi.src = '../js/editPassword.js';
            document.body.appendChild(scriptApi);
        }

        loadComponents();
    </script>
</body>

</html>
