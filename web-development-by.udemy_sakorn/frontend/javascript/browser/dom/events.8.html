<html lang="en">

<body>
    <!--สร้าง Event ขึ้นเองจากโค้ดเลย-->
    <button id="elem" onclick="alert('Click!');">Autoclick</button>

    <script>
        let event = new Event("click");
        elem.dispatchEvent(event); //สั่งให้ Element คลิ๊กเอง โดยไม่ต้องผ่าน User
    </script>

</body>

</html>
